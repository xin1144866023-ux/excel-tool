name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      convert_api_base:
        description: "Remote conversion API base URL. Leave empty to build the local converter package."
        required: false
        type: string

jobs:
  build:
    name: Windows installer
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CONVERT_API_BASE: ${{ inputs.convert_api_base }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        if: ${{ inputs.convert_api_base == '' }}
        run: python -m pip install --upgrade pyinstaller openpyxl

      - name: Install Node packages
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        if: ${{ inputs.convert_api_base == '' }}
        run: npm run dist:win

      - name: Build remote Windows installer
        if: ${{ inputs.convert_api_base != '' }}
        run: npm run dist:win:remote

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: excel-tool-windows
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
